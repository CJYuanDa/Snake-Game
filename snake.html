<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <link rel="stylesheet" href="snake.css">
    <script src="snake.js"></script>
</head>
<body>
    <h1>Snake Game</h1>
    <canvas id="canvas"></canvas>
    <div id="icon">
        <div id="food"></div>
        <div id="premium-food"></div>
        <div id="poison"></div>
    </div>
    <div id="score"></div>
    <div id="controls">
        <button id="pause">PAUSE</button>
        <button id="reset">RESET</button>
    </div>
    <div id="play">
        <div>Press control keys to start</div>
        <div>⬆️ or W</div>
        <div>⬇️ or S</div>
        <div>⬅️ or A</div>
        <div>➡️ or D </div>
    </div>
</body>
</html>
